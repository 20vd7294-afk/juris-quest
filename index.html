<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JURIS QUEST: GATEKEEPER</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --blood-red: #ff0000; --pure-white: #ffffff; --deep-black: #000000; --gold: #ffd700; }
        body, html { background-color: var(--deep-black); color: var(--pure-white); font-family: 'Orbitron', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        .screen { display: none; flex-direction: column; align-items: center; text-align: center; width: 90%; max-width: 600px; position: absolute; }
        .active { display: flex; }

        /* SHAKE ANIMATION */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
        .error-shake { animation: shake 0.2s ease-in-out 0s 2; border: 2px solid var(--blood-red) !important; }

        /* GATES */
        #gate-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 100; pointer-events: none; }
        .gate-door { position: absolute; width: 50%; height: 100%; background: #0a0a0a; border: 5px solid #222; transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1); }
        .left-door { left: 0; border-right: 2px solid var(--blood-red); }
        .right-door { right: 0; border-left: 2px solid var(--blood-red); }
        .gate-open .left-door { transform: translateX(-100%); }
        .gate-open .right-door { transform: translateX(100%); }

        /* UI */
        .btn { background: none; border: 2px solid var(--pure-white); color: var(--pure-white); padding: 15px 30px; font-family: 'Press Start 2P', cursive; font-size: 10px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: var(--blood-red); border-color: var(--blood-red); }
        
        .secret-input { background: #111; border: 1px solid #444; color: var(--blood-red); padding: 15px; font-family: 'Press Start 2P'; text-align: center; margin-top: 15px; width: 80%; outline: none; text-transform: uppercase; }
        
        .dragon { font-size: 80px; filter: drop-shadow(0 0 15px var(--blood-red)); animation: float 2s infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .quest-item { background: #111; border: 1px solid #333; padding: 12px; width: 100%; margin: 5px 0; display: flex; align-items: center; box-sizing: border-box; }
        input[type="checkbox"] { width: 20px; height: 20px; margin-right: 15px; accent-color: var(--blood-red); }
    </style>
</head>
<body>

    <div id="screen-gate" class="screen active">
        <h1 style="font-family: 'Press Start 2P'; font-size: 18px;">JURIS QUEST</h1>
        <button class="btn" onclick="goTo('screen-dragon')">ENTER THE VAULT</button>
    </div>

    <div id="screen-dragon" class="screen">
        <div class="dragon">🐲</div>
        <button class="btn" onclick="goTo('screen-tasks')">SHAW</button>
    </div>

    <div id="screen-tasks" class="screen">
        <h2 style="font-family: 'Press Start 2P'; font-size: 12px;">DAILY SCROLLS</h2>
        <div class="quest-item"><input type="checkbox" class="t-check"> <span>LNAT: Logical Drills</span></div>
        <div class="quest-item"><input type="checkbox" class="t-check"> <span>BINGHAM: Read Ch. 3</span></div>
        <div class="quest-item"><input type="checkbox" class="t-check"> <span>PS: Final Polish</span></div>
        
        <p id="ready-msg" style="display:none; color: var(--gold); font-size: 9px; margin-top: 15px; font-family: 'Press Start 2P';">TASKS COMPLETE. THE DRAGON WAITS.</p>
        <button id="hegale-btn" class="btn" style="display:none;" onclick="goTo('screen-auth')">HEGALE :&gt;</button>
    </div>

    <div id="screen-auth" class="screen">
        <div id="auth-box">
            <p style="color:var(--blood-red); font-size:10px; font-family:'Press Start 2P'; line-height: 1.6;">
                "ANSWER ME THIS, MORTAL:<br>What is the 5th word on page 42?"
            </p>
            <input type="text" id="user-code" class="secret-input" placeholder="TYPE ANSWER">
            <br>
            <button class="btn" onclick="checkFinalCode()">VERIFY</button>
        </div>
    </div>

    <div id="screen-cave" class="screen">
        <div class="dragon">🦖</div>
        <p style="color:var(--blood-red); font-family:'Press Start 2P'; font-size:10px;">"HOLLUP MORTAL..."</p>
        <div style="background: #111; padding: 20px; border: 1px solid var(--blood-red); font-size: 14px;">
            I'll be looking for you tomorrow. Oxford doesn't sleep.
        </div>
        <button class="btn" onclick="location.reload()" style="font-size: 8px; margin-top: 20px;">LOGOUT</button>
    </div>

    <div id="gate-container">
        <div class="gate-door left-door"></div>
        <div class="gate-door right-door"></div>
    </div>

    <script>
        // --- ADMIN SETTINGS ---
        const CORRECT_ANSWER = "JUSTICE"; // Put the answer here! (Case doesn't matter)
        // ----------------------

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function goTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        const checkboxes = document.querySelectorAll('.t-check');
        checkboxes.forEach(box => {
            box.addEventListener('change', () => {
                const completed = Array.from(checkboxes).every(c => c.checked);
                document.getElementById('hegale-btn').style.display = completed ? 'block' : 'none';
                document.getElementById('ready-msg').style.display = completed ? 'block' : 'none';
                if(completed) playSound(440, 'square', 0.1);
            });
        });

        function checkFinalCode() {
            const input = document.getElementById('user-code');
            if (input.value.trim().toUpperCase() === CORRECT_ANSWER.toUpperCase()) {
                // Success sound (ascending beep)
                playSound(600, 'square', 0.1); 
                setTimeout(() => playSound(900, 'square', 0.2), 100);
                triggerGateEffect();
            } else {
                // Fail sound (low buzz)
                playSound(120, 'sawtooth', 0.4);
                const box = document.getElementById('auth-box');
                box.classList.add('error-shake');
                setTimeout(() => box.classList.remove('error-shake'), 400);
                input.value = "";
            }
        }

        function triggerGateEffect() {
            const container = document.getElementById('gate-container');
            container.style.display = 'block';
            setTimeout(() => {
                container.classList.add('gate-open');
                goTo('screen-cave');
            }, 100);
        }
    </script>
</body>
</html>
