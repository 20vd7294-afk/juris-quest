<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JURIS QUEST: FLOWREY</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --white: #ffffff; --black: #000000; --gold: #ffff00; --orange: #ff9d00; --green: #00ff00; }
        * { cursor: crosshair; }
        body, html { background: var(--black); color: var(--white); font-family: 'Press Start 2P', cursive; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* FIXED PIXEL FLOWER (Stored inside the code) */
        .flowrey-sprite {
            width: 120px; height: 120px;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMklEQVQ4T2P8////fwYgYGRkxCHJCKMZByuG6UAnYBoasGlgwKCBAYMGBmwa0MFAVzMAtZ8mBe96D0IAAAAASUVORK5CYII=');
            background-size: contain; background-repeat: no-repeat; background-position: center;
            margin-bottom: 10px; animation: bob 2s infinite ease-in-out; image-rendering: pixelated;
        }
        @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .box { border: 4px solid var(--white); padding: 20px; width: 85%; max-width: 450px; background: var(--black); min-height: 100px; line-height: 1.6; margin-top: 10px; z-index: 5; }
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        .active { display: flex; }
        
        .btn { border: 2px solid var(--orange); background: none; color: var(--orange); padding: 12px 20px; font-family: 'Press Start 2P'; font-size: 10px; cursor: pointer; margin: 10px; }
        .btn:hover { background: var(--white); color: var(--black); }
        .locked { opacity: 0.2; cursor: not-allowed; }

        .task-list { width: 100%; margin: 10px 0; }
        .task { padding: 8px; display: flex; align-items: center; font-size: 10px; border-bottom: 1px solid #333; }
        input[type="checkbox"] { margin-right: 15px; width: 20px; height: 20px; accent-color: var(--green); }

        #gate-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 100; pointer-events: none; }
        .door { position: absolute; width: 50%; height: 100%; background: #000; border: 2px solid var(--white); transition: 1.2s; }
        .left { left: 0; } .right { right: 0; }
        .open .left { transform: translateX(-100%); }
        .open .right { transform: translateX(100%); }

        .shake { animation: shake 0.2s 2; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <div id="loader" class="screen active"><div>PREPARING...</div></div>

    <div id="s1" class="screen">
        <div class="flowrey-sprite"></div>
        <div class="box" id="t1"></div>
        <div id="countdown" style="color: var(--red); font-size: 10px; margin: 10px;"></div>
        <button class="btn" onclick="startApp()">[ SHAW ! ]</button>
    </div>

    <div id="s2" class="screen">
        <div class="box" id="t2">* (Tasks remain...)</div>
        <div class="task-list" id="live-tasks"></div>
        <div id="save-zone" style="display:none; margin:10px;">
            <button class="btn" style="color:var(--gold); border-color:var(--gold);" onclick="doSave()">⭐ [ SAVE ]</button>
        </div>
        <button class="btn locked" id="fight-btn" onclick="go('s3')">[ HEGALE ]</button>
    </div>

    <div id="s3" class="screen">
        <div class="flowrey-sprite"></div>
        <div class="box" id="t3"></div>
        <input type="text" id="ans" style="background:none; border:none; border-bottom:2px solid white; color:white; font-family:'Press Start 2P'; text-align:center; width:70%; outline:none; margin:20px;">
        <button class="btn" onclick="doVerify()">[ SCARED? ]</button>
    </div>

    <div id="s4" class="screen">
        <div class="flowrey-sprite"></div>
        <div class="box" id="t4"></div>
        <button class="btn" onclick="location.reload()">[ 🏳️ MERCY ]</button>
    </div>

    <div id="gate-wrap"><div class="door left"></div><div class="door right"></div></div>

    <script>
        // --- YOUR GOOGLE SHEET CSV URL HERE ---
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQX_HtgHl5hdoE4xC8GvJyO6Ag5n5LJhowfL5IhDHmmlQSc3UXcG5-7o5SGU2IBZNRb9WFFkusp4CG1/pub?output=csv"; 
        
        let audioCtx = null;
        let liveData = { key: "HI", t1: "Task 1", t2: "Task 2", t3: "Task 3", msg: "Keep going!", exam: "???" };

        function snd(f, d=0.05) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let o = audioCtx.createOscillator();
                let g = audioCtx.createGain();
                o.type = "sine"; o.frequency.value = f;
                g.gain.setValueAtTime(0.02, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + d);
            } catch(e) {}
        }

        function typeText(id, txt) {
            let i = 0; let el = document.getElementById(id);
            el.innerHTML = "";
            let timer = setInterval(() => {
                if (i < txt.length) {
                    el.innerHTML += txt[i];
                    if (txt[i] !== " ") snd(400);
                    i++;
                } else { clearInterval(timer); }
            }, 40);
        }

        async function fetchData() {
            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                const row = text.split('\n')[1].split(',');
                liveData = { t1: row[0], t2: row[1], t3: row[2], key: row[3].trim().toUpperCase(), msg: row[4], exam: row[5] };
            } catch (e) { console.log("Using Default Data"); }
            
            document.getElementById('loader').style.display = 'none';
            go('s1');
            typeText('t1', `* Howdy! I'm FLOWREY!\n* ${liveData.msg}`);
            document.getElementById('countdown').innerHTML = `EXAM IN: ${liveData.exam} DAYS`;
        }

        function startApp() { snd(500, 0.1); go('s2'); renderTasks(); }

        function renderTasks() {
            document.getElementById('live-tasks').innerHTML = `
                <div class="task"><input type="checkbox" class="chk"> <span>${liveData.t1}</span></div>
                <div class="task"><input type="checkbox" class="chk"> <span>${liveData.t2}</span></div>
                <div class="task"><input type="checkbox" class="chk"> <span>${liveData.t3}</span></div>`;
            document.querySelectorAll('.chk').forEach(c => {
                c.onchange = () => {
                    let all = Array.from(document.querySelectorAll('.chk')).every(x => x.checked);
                    document.getElementById('save-zone').style.display = all ? 'block' : 'none';
                };
            });
        }

        function go(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
            if(id === 's3') typeText('t3', "* Golly, you need a key for this door!");
            if(id === 's4') typeText('t4', "* See? Hard work pays off!");
        }

        function doSave() {
            snd(600, 0.2);
            document.getElementById('fight-btn').classList.remove('locked');
            document.getElementById('save-zone').innerHTML = "* Progress Saved.";
        }

        function doVerify() {
            let val = document.getElementById('ans').value.trim().toUpperCase();
            if (val === "") return;
            if (val === liveData.key) {
                let w = document.getElementById('gate-wrap');
                w.style.display = "block";
                setTimeout(() => { w.classList.add('open'); go('s4'); }, 100);
            } else {
                snd(100, 0.3);
                document.getElementById('s3').classList.add('shake');
                setTimeout(() => document.getElementById('s3').classList.remove('shake'), 300);
                document.getElementById('ans').value = "";
            }
        }

        fetchData();
    </script>
</body>
</html>
