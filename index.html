<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JURIS QUEST: LIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --white: #ffffff; --black: #000000; --gold: #ffff00; --orange: #ff9d00; }
        * { cursor: crosshair; }
        body, html { background: var(--black); color: var(--white); font-family: 'Press Start 2P', cursive; margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        .box { border: 4px solid var(--white); padding: 20px; width: 90%; max-width: 500px; background: var(--black); margin-bottom: 20px; }
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        .active { display: flex; }
        
        .btn { border: 2px solid var(--orange); background: none; color: var(--orange); padding: 12px 20px; font-family: 'Press Start 2P'; font-size: 10px; cursor: pointer; margin: 5px; }
        .btn:hover { background: var(--white); color: var(--black); }
        .locked { opacity: 0.2; cursor: not-allowed; }

        .task-list { width: 90%; max-width: 400px; margin: 15px 0; }
        .task { padding: 10px; display: flex; align-items: center; font-size: 10px; border-bottom: 1px solid #222; }
        input[type="checkbox"] { margin-right: 15px; width: 22px; height: 22px; }

        #countdown { color: var(--red); font-size: 10px; margin-top: 10px; }
        .loading { color: var(--gold); font-size: 12px; }
    </style>
</head>
<body>

    <div id="loader" class="screen active">
        <div class="loading">COMMUNING WITH THE DRAGON...</div>
    </div>

    <div id="s1" class="screen">
        <div class="box" id="dragon-note">* Welcome, Qasim.</div>
        <div id="countdown"></div>
        <button class="btn" onclick="go('s2')">[ START ]</button>
    </div>

    <div id="s2" class="screen">
        <div class="box">* TODAY'S SACRIFICE:</div>
        <div class="task-list" id="live-tasks"></div>
        <div id="save-zone" style="display:none; text-align:center;">
            <div style="color:var(--gold); margin: 10px;">⭐ TASK COMPLETE</div>
            <button class="btn" onclick="doSave()">[ SAVE PROGRESS ]</button>
        </div>
        <div style="margin-top: 20px;">
            <button class="btn locked" id="fight-btn" onclick="go('s3')">[ FIGHT ]</button>
        </div>
    </div>

    <div id="s3" class="screen">
        <div class="box">* THE GUARDIAN:<br><br>Enter the code from your books.</div>
        <input type="text" id="ans" style="background:none; border:none; border-bottom:2px solid white; color:red; font-family:'Press Start 2P'; text-align:center; width:80%; outline:none; margin:20px;">
        <button class="btn" onclick="doVerify()">[ VERIFY ]</button>
    </div>

    <div id="s4" class="screen">
        <div class="box">* VICTORY.<br><br>The Dragon is satisfied... for now.</div>
        <button class="btn" onclick="location.reload()">[ REST ]</button>
    </div>

    <script>
        // PASTE YOUR PUBLISHED CSV URL HERE:
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQX_HtgHl5hdoE4xC8GvJyO6Ag5n5LJhowfL5IhDHmmlQSc3UXcG5-7o5SGU2IBZNRb9WFFkusp4CG1/pub?output=csv"; 
        
        let liveData = {};

        async function fetchData() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n')[1].split(','); // Gets the 2nd row
                
                liveData = {
                    t1: rows[0], t2: rows[1], t3: rows[2],
                    key: rows[3].trim().toUpperCase(),
                    msg: rows[4],
                    exam: rows[5]
                };

                renderApp();
            } catch (e) {
                document.getElementById('loader').innerHTML = "ERROR: DRAGON DISCONNECTED.";
            }
        }

        function renderApp() {
            document.getElementById('dragon-note').innerHTML = `* DRAGON: ${liveData.msg}`;
            document.getElementById('countdown').innerHTML = `DAYS TO EXAM: ${liveData.exam}`;
            
            const taskHtml = `
                <div class="task"><input type="checkbox" class="chk"> <span>${liveData.t1}</span></div>
                <div class="task"><input type="checkbox" class="chk"> <span>${liveData.t2}</span></div>
                <div class="task"><input type="checkbox" class="chk"> <span>${liveData.t3}</span></div>
            `;
            document.getElementById('live-tasks').innerHTML = taskHtml;

            // Setup listeners for new tasks
            document.querySelectorAll('.chk').forEach(c => {
                c.onchange = () => {
                    const all = Array.from(document.querySelectorAll('.chk')).every(x => x.checked);
                    document.getElementById('save-zone').style.display = all ? 'block' : 'none';
                };
            });

            document.getElementById('loader').style.display = 'none';
            document.getElementById('s1').style.display = 'flex';
        }

        function go(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
        }

        function doSave() {
            document.getElementById('fight-btn').classList.remove('locked');
            document.getElementById('save-zone').innerHTML = "<div style='color:var(--gold)'>PROGRESS SAVED.</div>";
        }

        function doVerify() {
            if (document.getElementById('ans').value.toUpperCase() === liveData.key) {
                go('s4');
            } else {
                alert("WRONG. THE DRAGON GROWS IMPATIENT.");
            }
        }

        fetchData();
    </script>
</body>
</html>
