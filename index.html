<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JURIS QUEST: FLOWREY</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --white: #ffffff; --black: #000000; --gold: #ffff00; --orange: #ff9d00; --green: #00ff00; }
        
        * { cursor: url('https://cur.cursors-4u.net/games/gam-13/gam1216.cur'), auto !important; }
        body, html { background: var(--black); color: var(--white); font-family: 'Press Start 2P', cursive; margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        /* FLOWREY SPRITE STYLE */
        .flowrey-sprite {
            width: 100px;
            height: 100px;
            background-image: url('https://i.imgur.com/8MInM4I.png'); /* This is the sprite you uploaded */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin-bottom: 10px;
            animation: sway 3s infinite ease-in-out;
            image-rendering: pixelated;
        }

        @keyframes sway {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        .box { border: 4px solid var(--white); padding: 20px; width: 90%; max-width: 500px; background: var(--black); margin-bottom: 20px; min-height: 100px; line-height: 1.6; }
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        .active { display: flex; }
        
        .btn { border: 2px solid var(--orange); background: none; color: var(--orange); padding: 12px 20px; font-family: 'Press Start 2P'; font-size: 10px; cursor: pointer; margin: 5px; text-transform: uppercase; }
        .btn:hover { background: var(--white); color: var(--black); }
        .locked { opacity: 0.2; cursor: not-allowed; }

        .task-list { width: 90%; max-width: 400px; margin: 15px 0; }
        .task { padding: 10px; display: flex; align-items: center; font-size: 10px; border-bottom: 1px solid #222; }
        input[type="checkbox"] { margin-right: 15px; width: 22px; height: 22px; accent-color: var(--green); }

        #gate-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 100; pointer-events: none; }
        .door { position: absolute; width: 50%; height: 100%; background: #080808; border: 2px solid var(--white); transition: 1.2s; }
        .left { left: 0; } .right { right: 0; }
        .open .left { transform: translateX(-100%); }
        .open .right { transform: translateX(100%); }

        .shake { animation: shake 0.2s ease-in-out 2; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <div id="loader" class="screen active"><div style="color:var(--gold)">GENERATING WORLD...</div></div>

    <div id="s1" class="screen">
        <div class="flowrey-sprite"></div>
        <div style="font-size: 14px; color: var(--green); margin-bottom: 10px;">FLOWREY</div>
        <div class="box" id="t1"></div>
        <div id="countdown" style="color: var(--red); font-size: 10px; margin-bottom: 10px;"></div>
        <button class="btn" onclick="startApp()">[  START ]</button>
    </div>

    <div id="s2" class="screen">
        <div class="box" id="t2">* (The world seems peaceful... for now.)</div>
        <div class="task-list" id="live-tasks"></div>
        <div id="save-zone" style="display:none; text-align:center; margin:10px;">
            <div style="color:var(--gold); font-size:16px; cursor:pointer;" onclick="doSave()">⭐ [ SAVE ]</div>
        </div>
        <button class="btn locked" id="fight-btn" onclick="go('s3')">[  FIGHT ]</button>
    </div>

    <div id="s3" class="screen">
        <div class="flowrey-sprite"></div>
        <div class="box" id="t3">* Howdy! Entering the passkey?</div>
        <input type="text" id="ans" style="background:none; border:none; border-bottom:2px solid white; color:var(--white); font-family:'Press Start 2P'; text-align:center; width:80%; outline:none; margin:20px;" placeholder="CODE">
        <button class="btn" onclick="doVerify()">[  VERIFY ]</button>
    </div>

    <div id="s4" class="screen">
        <div class="flowrey-sprite"></div>
        <div class="box" id="t4">* Golly! You're really something, aren't you?</div>
        <button class="btn" onclick="location.reload()">[ 🏳️ MERCY ]</button>
    </div>

    <div id="gate-wrap"><div class="door left"></div><div class="door right"></div></div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQX_HtgHl5hdoE4xC8GvJyO6Ag5n5LJhowfL5IhDHmmlQSc3UXcG5-7o5SGU2IBZNRb9WFFkusp4CG1/pub?output=csv"; 
        
        let audioCtx = null;
        let liveData = { key: "" };

        function snd(f, type="square", d=0.1, v=0.04) {
            if (!audioCtx) audioCtx = new AudioContext();
            let o = audioCtx.createOscillator();
            let g = audioCtx.createGain();
            o.type = type; o.frequency.value = f;
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function type(id, txt) {
            let i = 0; let el = document.getElementById(id); el.innerHTML = "";
            let timer = setInterval(() => {
                if (i < txt.length) {
                    el.innerHTML += txt[i];
                    if (txt[i] !== " ") snd(350, "sine", 0.05, 0.03);
                    i++;
                } else { clearInterval(timer); }
            }, 50);
        }

        async function fetchData() {
            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                const row = text.split('\n')[1].split(',');
                liveData = { t1: row[0], t2: row[1], t3: row[2], key: row[3].trim().toUpperCase(), msg: row[4], exam: row[5] };
                document.getElementById('loader').style.display = 'none';
                go('s1');
                type('t1', `* Howdy! I'm FLOWREY! \n* ${liveData.msg}`);
                document.getElementById('countdown').innerHTML = `TIME UNTIL HARVEST: ${liveData.exam} DAYS`;
            } catch (e) { document.getElementById('loader').innerHTML = "WORLD LOAD FAILED."; }
        }

        function startApp() { snd(523, "sine", 0.1); go('s2'); type('t2', "* Do your chores, and I'll let you pass!"); renderTasks(); }

        function renderTasks() {
            document.getElementById('live-tasks').innerHTML = `
                <div class="task"><input type="checkbox" class="chk"> <span>${liveData.t1}</span></div>
                <div class="task"><input type="checkbox" class="chk"> <span>${liveData.t2}</span></div>
                <div class="task"><input type="checkbox" class="chk"> <span>${liveData.t3}</span></div>`;
            document.querySelectorAll('.chk').forEach(c => {
                c.onchange = () => {
                    let all = Array.from(document.querySelectorAll('.chk')).every(x => x.checked);
                    document.getElementById('save-zone').style.display = all ? 'block' : 'none';
                    if(all) snd(800, "sine", 0.1);
                };
            });
        }

        function go(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function doSave() {
            snd(659, "square", 0.1); setTimeout(() => snd(880, "square", 0.2), 100);
            document.getElementById('fight-btn').classList.remove('locked');
            document.getElementById('save-zone').innerHTML = "<div style='color:var(--gold)'>PROGRESS SAVED.</div>";
            type('t2', "* You are filled with DETERMINATION.");
        }

        function doVerify() {
            let input = document.getElementById('ans').value.trim().toUpperCase();
            if (input === "" || liveData.key === "") return;
            if (input === liveData.key) {
                snd(1000, "sine", 0.5);
                let w = document.getElementById('gate-wrap');
                w.style.display = "block";
                setTimeout(() => { w.classList.add('open'); go('s4'); type('t4', "* Golly! You're stronger than you look!"); }, 100);
            } else {
                snd(150, "sawtooth", 0.3);
                document.getElementById('s3').classList.add('shake');
                setTimeout(() => document.getElementById('s3').classList.remove('shake'), 300);
            }
        }

        fetchData();
    </script>
</body>
</html>
